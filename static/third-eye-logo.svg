<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Third Eye logo</title>
  <desc id="desc">A luminous eye mark for the Third Eye Conscience Agent app.</desc>
  <defs>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(48 48) rotate(90) scale(44)">
      <stop offset="0" stop-color="#9E7AFF" stop-opacity="0.55"/>
      <stop offset="0.58" stop-color="#7C4DFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00E676" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eyeStroke" x1="15" y1="50" x2="81" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E676"/>
      <stop offset="0.5" stop-color="#9E7AFF"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="iris" x1="37" y1="37" x2="59" y2="59" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E676"/>
      <stop offset="0.52" stop-color="#9E7AFF"/>
      <stop offset="1" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="softGlow" x="-20" y="-20" width="136" height="136" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.486 0 0 0 0 0.302 0 0 0 0 1 0 0 0 0.55 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>
  <circle cx="48" cy="48" r="44" fill="url(#halo)"/>
  <path d="M48 13V25" stroke="#9E7AFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M29 20L35 30" stroke="#00E676" stroke-opacity="0.74" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M67 20L61 30" stroke="#7C4DFF" stroke-opacity="0.88" stroke-width="3.5" stroke-linecap="round"/>
  <g filter="url(#softGlow)">
    <path d="M14 49.5C23.8 35.8 35.1 29 48 29C60.9 29 72.2 35.8 82 49.5C72.2 63.2 60.9 70 48 70C35.1 70 23.8 63.2 14 49.5Z" fill="#10121D" stroke="url(#eyeStroke)" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="48" cy="49.5" r="15" fill="url(#iris)"/>
    <circle cx="48" cy="49.5" r="7.5" fill="#0D0E15"/>
    <circle cx="43" cy="43.5" r="3" fill="#E2E4F0"/>
  </g>
  <path d="M30 78C36.2 82.3 42.2 84.5 48 84.5C53.8 84.5 59.8 82.3 66 78" stroke="#9E7AFF" stroke-opacity="0.7" stroke-width="3.5" stroke-linecap="round"/>
</svg>
